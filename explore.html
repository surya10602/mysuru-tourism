<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Mysuru</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #111; color: white; }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            height: 100vh;
        }
        .column {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
            background-size: cover;
            background-position: center;
            transition: flex 0.5s ease;
        }
        .column::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); z-index: 1; transition: background 0.3s;
        }
        .column:hover::before { background: rgba(0,0,0,0.4); }
        .content { position: relative; z-index: 2; }
        h2 { font-size: 2.5rem; margin-bottom: 15px; }
        p { margin-bottom: 30px; font-size: 1.1rem; }
        .btn {
            padding: 10px 30px; color: white; border: 2px solid white; text-decoration: none;
            border-radius: 25px; font-weight: bold; transition: all 0.3s;
        }
        .btn:hover { background: white; color: #111; }
        
        /* Using your local images here */
        .palace { background-image: url('Mysore-Palace.webp'); }
        .chamundi { background-image: url('Chamundi hills.jpg'); }
        .gardens { background-image: url('brindavan.jpg'); }
    </style>
</head>
<body>
    <div class="grid-container">
        <div class="column palace">
            <div class="content">
                <h2>Mysore Palace</h2>
                <p>The crown jewel of the city, blending multiple architectural styles.</p>
                <a href="palace.html" class="btn">View Details</a>
            </div>
        </div>
        <div class="column chamundi">
            <div class="content">
                <h2>Chamundi Hills</h2>
                <p>A sacred hill offering panoramic views and ancient temples.</p>
                <a href="chamundi.html" class="btn">View Details</a>
            </div>
        </div>
        <div class="column gardens">
            <div class="content">
                <h2>Brindavan Gardens</h2>
                <p>Spectacular terraced gardens famous for musical fountains.</p>
                <a href="brindavan.html" class="btn">View Details</a>
            </div>
        </div>
    </div>
</body>
</html>
