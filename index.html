<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Mysuru | The Cultural Capital</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('front.jpg') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 0 20px;
        }
        h1 { font-size: 4rem; margin-bottom: 10px; letter-spacing: 2px; }
        p { font-size: 1.2rem; max-width: 700px; margin-bottom: 40px; line-height: 1.6; }
        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            color: white;
            background-color: #8b0000;
            text-decoration: none;
            border-radius: 30px;
            transition: background 0.3s, transform 0.3s;
        }
        .btn:hover { background-color: #a50000; transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="hero">
        <h1>MYSURU</h1>
        <p>Step into a world of royal heritage, magnificent architecture, and vibrant culture. Discover the City of Palaces, where every street tells a story of history and tradition.</p>
        <a href="explore.html" class="btn">Explore Destinations</a>
    </div>
</body>
</html>
